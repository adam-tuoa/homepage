<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Simmons | Data Analyst & Creative Problem Solver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="hero-name">Adam Simmons</h1>
                <div class="hero-tagline">
                    <p class="tagline-static">Data solutions</p>
                    <p class="tagline-line">Creative problem solver</p>
                    <p class="tagline-line">Curious</p>
                    <p class="tagline-line">Cares</p>
                    <p class="tagline-line">Making a difference</p>
                </div>
            </div>
            <div class="hero-image-wrapper">
                <img src="images/Adam Simmons - credit Sarah Walker.jpg" alt="Adam Simmons holding a colorful toy mobile" class="hero-image">
            </div>
        </div>

        <!-- Subtle animated background elements -->
        <canvas id="background-canvas"></canvas>

        <!-- Scroll hint -->
        <div class="scroll-hint">
            <div class="scroll-arrow"></div>
            <div class="scroll-hint-coming">Coming soon</div>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
